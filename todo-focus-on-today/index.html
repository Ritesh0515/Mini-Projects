<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus on Today</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
  <main>
    <h1 class="title">Focus on <span>Today</span></h1>
    <div class="container">
      <h2 class="sub-title">
        <span>Today</span>
       <img src="images/outter-ring.svg" alt="sun-icon" class="sun-icon">
      </h2>
      <p class="progress-label">Raise the bar by completing your goals!</p>
      <div class="progress-bar">
        <div class="progress-value">
          <span>2/3 completed</span>
        </div>
        <p class="error-label">Please set all the 3 goals!</p>
      </div>
      <div class="goal-container">
        <div class="custom-checkbox">
          <img src="images/Vector 1.svg" alt="checkmark" class="checkmark" />
        </div>
        <input type="text" class="goal-input" placeholder="Add new goal..." id="first" />
      </div>
      <div class="goal-container">
        <div class="custom-checkbox">
          <img src="images/Vector 1.svg" alt="checkmark" class="checkmark" />
        </div>
        <input type="text" class="goal-input" placeholder="Add new goal..." id="second" />
      </div>
      <div class="goal-container">
        <div class="custom-checkbox">
          <img src="images/Vector 1.svg" alt="checkmark" class="checkmark" />
        </div>
        <input type="text" class="goal-input" placeholder="Add new goal..." id="third" />
      </div>

      <p class="quote">“Move one step ahead, today!”</p>
      <p class="owner">Made by Ritesh Sahu ❤️</p>
    </div>
  </main>
</body>

</html>
